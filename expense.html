<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>立替精算</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{ --green:#2e7d32; --green-d:#1b5e20; --line:#e0e0e0; --bg:#f7f8f7; --ink:#222; --sub:#666; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif; }
  .wrap{ max-width:560px; margin:0 auto; padding:16px 16px 40px; }
  h1{ font-size:18px; margin:8px 0 4px; display:flex; align-items:center; gap:8px; }
  .lead{ color:var(--sub); font-size:13px; margin:0 0 16px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; }
  label{ display:block; font-size:13px; font-weight:600; margin:14px 0 6px; }
  label:first-of-type{ margin-top:0; }
  .req::after{ content:"必須"; color:#c62828; font-size:11px; margin-left:6px; font-weight:600; }
  select,input[type=number],input[type=text]{ width:100%; padding:12px; font-size:16px;
    border:1px solid var(--line); border-radius:10px; background:#fff; }
  select:focus,input:focus{ outline:none; border-color:var(--green); }
  .amount-wrap{ position:relative; }
  .amount-wrap input{ padding-left:28px; }
  .yen{ position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--sub); }
  .photo-btn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    padding:14px; border:1.5px dashed var(--green); border-radius:10px; color:var(--green);
    background:#f1f8f2; font-size:15px; font-weight:600; cursor:pointer; }
  .photo-btn input{ display:none; }
  #preview{ margin-top:10px; text-align:center; }
  #preview img{ max-width:100%; max-height:220px; border-radius:10px; border:1px solid var(--line); }
  .hint{ font-size:12px; color:var(--sub); margin-top:6px; }
  button.submit{ width:100%; margin-top:22px; padding:15px; font-size:16px; font-weight:700;
    color:#fff; background:var(--green); border:none; border-radius:12px; }
  button.submit:disabled{ background:#a5d6a7; }
  .msg{ padding:14px; border-radius:10px; font-size:14px; margin-bottom:14px; display:none; }
  .msg.err{ background:#fdecea; color:#b71c1c; display:block; }
  .msg.ok{ background:#e8f5e9; color:var(--green-d); display:block; }
  .center{ text-align:center; padding:40px 16px; color:var(--sub); }
  .spinner{ width:26px; height:26px; border:3px solid #ddd; border-top-color:var(--green);
    border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div id="loading" class="center">
    <div class="spinner"></div>
    <div>読み込み中…</div>
  </div>

  <div id="form" style="display:none;">
    <h1>💰 立替精算</h1>
    <p class="lead" id="who"></p>
    <div id="msg" class="msg"></div>
    <div class="card">
      <label class="req" for="job">物件</label>
      <select id="job"></select>

      <label class="req" for="amount">金額</label>
      <div class="amount-wrap">
        <span class="yen">¥</span>
        <input id="amount" type="number" inputmode="numeric" min="1" step="1" placeholder="例）1200">
      </div>

      <label class="req" for="purpose">用途</label>
      <input id="purpose" type="text" placeholder="例）トイレットペーパー・洗剤">

      <label>領収書の写真</label>
      <label class="photo-btn">
        📷 領収書を撮影 / 選択
        <input id="photo" type="file" accept="image/*" capture="environment">
      </label>
      <div id="preview"></div>
      <div class="hint">撮影後、自動で縮小して送信します（任意）。</div>
    </div>
    <button id="submit" class="submit">この内容で送信する</button>
  </div>

  <div id="done" class="center" style="display:none;">
    <div style="font-size:40px;">✅</div>
    <div style="font-weight:700; margin:8px 0;">送信しました</div>
    <div>LINEに記録の確認メッセージが届きます。<br>この画面は自動で閉じます。</div>
  </div>
</div>

<script>
// ===== 設定（★発行後に差し替え） =====
const LIFF_ID  = '2010751229-dOTJoOzI';                 // 立替用LIFF ID（挙手と同一チャネル＝userId整合OK）
const GAS_URL  = 'https://script.google.com/macros/s/AKfycby4-EDHkLlwXpsvwnQLtohW7gvAMc_wqN9kkt-O3yKvclKHqa8zHcJzJThiXjhrFUuucQ/exec'; // ★清掃管理の実行URL（要確認）

const $ = (id) => document.getElementById(id);
let me = null;          // {userId, name}
let jobsMap = {};       // jobKey -> {pid, name, cleanDate}

function showError(text){
  $('loading').style.display='none';
  $('form').style.display='block';
  const m=$('msg'); m.className='msg err'; m.textContent=text;
}

// GAS への JSONP GET（読み取り用・リダイレクトを避けるため script タグ方式）
function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*100000);
    const s=document.createElement('script');
    const timer=setTimeout(()=>{ cleanup(); reject(new Error('timeout')); }, 15000);
    function cleanup(){ clearTimeout(timer); delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); }
    window[cb]=(data)=>{ cleanup(); resolve(data); };
    s.onerror=()=>{ cleanup(); reject(new Error('network')); };
    s.src=url+(url.indexOf('?')>=0?'&':'?')+'callback='+cb;
    document.body.appendChild(s);
  });
}

// 画像を縮小して dataURL(JPEG) にする（送信サイズ削減）
function resizeImage(file, maxDim=1600, quality=0.72){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width, h=img.height;
      const long=Math.max(w,h);
      if(long>maxDim){ const s=maxDim/long; w=Math.round(w*s); h=Math.round(h*s); }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      try{ resolve(c.toDataURL('image/jpeg', quality)); }catch(e){ reject(e); }
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('image')); };
    img.src=url;
  });
}

// 写真プレビュー
$('photo').addEventListener('change', (e)=>{
  const f=e.target.files[0]; const p=$('preview'); p.innerHTML='';
  if(!f) return;
  const im=new Image(); im.src=URL.createObjectURL(f);
  im.onload=()=>URL.revokeObjectURL(im.src);
  p.appendChild(im);
});

// 送信
$('submit').addEventListener('click', async ()=>{
  const jobKey=$('job').value;
  const amount=parseInt($('amount').value,10);
  const purpose=$('purpose').value.trim();
  const m=$('msg');
  if(!jobKey){ m.className='msg err'; m.textContent='物件を選んでください。'; return; }
  if(!(amount>0)){ m.className='msg err'; m.textContent='金額を正しく入力してください。'; return; }
  if(!purpose){ m.className='msg err'; m.textContent='用途を入力してください。'; return; }

  const btn=$('submit'); btn.disabled=true; btn.textContent='送信中…';
  m.className='msg'; m.style.display='none';

  try{
    let base64='';
    const f=$('photo').files[0];
    if(f){ const dataUrl=await resizeImage(f); base64=dataUrl.split(',')[1]||''; }

    const job=jobsMap[jobKey]||{};
    const payload={
      mode:'exp_submit',
      userId: me.userId,
      jobKey: jobKey,
      pid: job.pid||'',
      propName: job.name||'',
      cleanDate: job.cleanDate||'',
      amount: amount,
      purpose: purpose,
      receiptBase64: base64,
      receiptMime: base64 ? 'image/jpeg' : ''
    };

    // データ送信は POST。GASのリダイレクト先はCORSを返さないため no-cors（送信は成立・応答は読まない）。
    // 記録確認は GAS 側から本人LINEへ push する運用。
    await fetch(GAS_URL+'?mode=exp_submit', {
      method:'POST', mode:'no-cors',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });

    $('form').style.display='none';
    $('done').style.display='block';
    setTimeout(()=>{ if(window.liff && liff.isInClient()) liff.closeWindow(); }, 1800);
  }catch(err){
    btn.disabled=false; btn.textContent='この内容で送信する';
    m.className='msg err'; m.textContent='送信に失敗しました。電波の良い場所で再度お試しください。';
  }
});

// 起動
(async function init(){
  try{
    await liff.init({ liffId: LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }   // ★redirectUriは指定しない（ループ回避）
    const prof=await liff.getProfile();
    me={ userId: prof.userId, name: prof.displayName };

    const res=await jsonp(GAS_URL+'?mode=exp_jobs&userId='+encodeURIComponent(me.userId));
    if(!res || !res.ok){ showError((res&&res.message)||'情報の取得に失敗しました。'); return; }

    if(res.staff && res.staff.name){ $('who').textContent=res.staff.name+' さん'; }
    const sel=$('job'); sel.innerHTML='';
    const jobs=res.jobs||[];
    if(!jobs.length){
      const o=document.createElement('option'); o.value=''; o.textContent='本日の清掃物件がありません';
      sel.appendChild(o);
    }else{
      const ph=document.createElement('option'); ph.value=''; ph.textContent='選択してください'; sel.appendChild(ph);
      jobs.forEach(j=>{
        jobsMap[j.jobKey]={ pid:j.pid, name:j.name, cleanDate:j.cleanDate };
        const o=document.createElement('option'); o.value=j.jobKey; o.textContent=j.name; sel.appendChild(o);
      });
    }
    $('loading').style.display='none';
    $('form').style.display='block';
  }catch(e){
    showError('LIFFの初期化に失敗しました。時間をおいて再度お試しください。');
  }
})();
</script>
</body>
</html>
