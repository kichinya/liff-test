<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>清掃挙手</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{ --green:#2e7d32; --ink:#222; --sub:#666; --bg:#f7f8f7; --line:#e0e0e0; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif; }
  .wrap{ max-width:480px; margin:0 auto; padding:40px 20px; text-align:center; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:16px; padding:32px 20px; }
  .emoji{ font-size:52px; line-height:1; }
  h1{ font-size:20px; margin:16px 0 8px; }
  p{ color:var(--sub); font-size:14px; line-height:1.7; margin:6px 0; }
  .btn{ display:inline-block; margin-top:22px; padding:13px 28px; background:var(--green);
    color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
  .sub{ margin-top:10px; font-size:12px; color:#999; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="emoji">🚧</div>
    <h1>清掃挙手は準備中です</h1>
    <p>担当エリアの募集通知に手を挙げる機能は<br>現在準備中です。</p>
    <p>準備が整いましたら、こちらからご案内します。<br>もう少々お待ちください。</p>
    <button class="btn" onclick="closeLiff()">閉じる</button>
    <div class="sub" id="sub"></div>
  </div>
</div>
<script>
  // 挙手LIFF(2010751229-9u6958G7)用の準備中ページ。
  // liff.init は行うが、ログイン強制やデータ送信はしない(準備中のため)。
  var LIFF_ID = '2010751229-9u6958G7';
  function closeLiff(){ if (window.liff && liff.isInClient && liff.isInClient()) liff.closeWindow(); }
  try {
    liff.init({ liffId: LIFF_ID }).catch(function(){ /* 準備中のため失敗は無視 */ });
  } catch (e) { /* SDK未読込でも準備中表示は出す */ }
</script>
</body>
</html>
