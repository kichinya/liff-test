<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>清掃希望を送信</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{ --green:#2e7d32; --green-l:#e8f5e9; --ink:#222; --sub:#666; --bg:#f7f8f7; --line:#e0e0e0; --off:#fff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif; }
  .wrap{ max-width:480px; margin:0 auto; padding:16px 14px 96px; }
  .hello{ font-size:16px; font-weight:700; margin:6px 2px 2px; }
  .lead{ font-size:13px; color:var(--sub); margin:0 2px 14px; line-height:1.6; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 12px; margin-bottom:14px; }
  .monthTitle{ font-size:15px; font-weight:700; margin:4px 2px 10px; }
  .dow{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:4px; }
  .dow span{ text-align:center; font-size:11px; color:var(--sub); padding:2px 0; }
  .dow span.sat{ color:#1565c0; }
  .dow span.sun{ color:#c62828; }
  .grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cell{ aspect-ratio:1/1; display:flex; align-items:center; justify-content:center;
    font-size:14px; border-radius:9px; border:1px solid var(--line); background:var(--off);
    color:var(--ink); cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; }
  .cell.empty{ border:none; background:transparent; cursor:default; }
  .cell.past{ color:#ccc; background:#fafafa; border-color:#f0f0f0; cursor:default; }
  .cell.on{ background:var(--green); color:#fff; border-color:var(--green); font-weight:700; }
  .cell.sat{ color:#1565c0; }
  .cell.sun{ color:#c62828; }
  .cell.on.sat, .cell.on.sun{ color:#fff; }
  .bar{ position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom)); max-width:480px; margin:0 auto; }
  .count{ font-size:13px; color:var(--sub); margin-bottom:6px; text-align:center; }
  .count b{ color:var(--green); font-size:15px; }
  .btn{ display:block; width:100%; padding:14px; background:var(--green); color:#fff; border:none;
    border-radius:11px; font-size:16px; font-weight:700; cursor:pointer; }
  .btn:disabled{ background:#bdbdbd; cursor:default; }
  .msg{ text-align:center; font-size:13px; margin:10px 2px 0; min-height:18px; }
  .msg.ok{ color:var(--green); }
  .msg.err{ color:#c62828; }
  .loading{ text-align:center; color:var(--sub); font-size:14px; padding:40px 0; }
  .hint{ font-size:12px; color:#999; margin:2px 2px 12px; }
</style>
</head>
<body>
<div class="wrap">
  <div id="app">
    <div class="loading" id="loading">読み込み中…</div>
  </div>
</div>

<div class="bar" id="bar" style="display:none;">
  <div class="count">稼働できる日：<b id="cnt">0</b> 日</div>
  <button class="btn" id="send" onclick="submitShift()">送信する</button>
  <div class="msg" id="msg"></div>
</div>

<script>
  // ============================================================
  //  清掃希望を送信(シフト提出)  index.html  v3.31
  //  - LIFF初期化・jsonpパターンは report.html と同一
  //  - GAS: ?mode=shift_get で前回提出取得 / ?mode=shift_set で差分送信
  // ============================================================
  var LIFF_ID = '2010751229-9u6958G7';   // 挙手/清掃希望 LIFF(既存)
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbx_ubqKRZeQfNL7qIiElNzE0iTjvq7487Hzx3xor8P4M-u55hF7-EL0n8G-5nYofc_sXg/exec';
  var RANGE_DAYS = 30;                    // 今日から何日先まで表示するか(GAS側と一致)

  var ME = null;                          // { userId, name }
  var selected = {};                      // { 'YYYY-MM-DD': true }

  function closeLiff(){ if (window.liff && liff.isInClient && liff.isInClient()) liff.closeWindow(); }

  // ---- JSONP(report.html と同一パターン) ----
  function jsonp(url){
    return new Promise(function(resolve, reject){
      var cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*100000);
      var s = document.createElement('script');
      var timer = setTimeout(function(){ cleanup(); reject(new Error('timeout')); }, 15000);
      function cleanup(){ clearTimeout(timer); try{ delete window[cb]; }catch(e){ window[cb]=undefined; }
        if (s.parentNode) s.parentNode.removeChild(s); }
      window[cb] = function(data){ cleanup(); resolve(data); };
      s.onerror = function(){ cleanup(); reject(new Error('network')); };
      s.src = url + (url.indexOf('?')>=0?'&':'?') + 'callback=' + cb;
      document.body.appendChild(s);
    });
  }

  // ---- 日付ヘルパ ----
  function ymd(d){
    var y=d.getFullYear(), m=('0'+(d.getMonth()+1)).slice(-2), da=('0'+d.getDate()).slice(-2);
    return y+'-'+m+'-'+da;
  }
  function startOfToday(){ var d=new Date(); d.setHours(0,0,0,0); return d; }

  // ---- カレンダー描画(今日〜RANGE_DAYS先。月ごとにブロック) ----
  function renderCalendar(){
    var app = document.getElementById('app');
    app.innerHTML = '';

    var hello = document.createElement('div');
    hello.className='hello';
    hello.textContent = 'こんにちは、' + (ME && ME.name ? ME.name : '') + ' さん';
    app.appendChild(hello);

    var lead = document.createElement('div');
    lead.className='lead';
    lead.textContent = '清掃に入れる日をタップして選び、「送信する」を押してください。いつでも変更できます。';
    app.appendChild(lead);

    var today = startOfToday();
    var end = new Date(today.getTime()); end.setDate(today.getDate() + RANGE_DAYS - 1);

    // 月ごとに分割
    var cur = new Date(today.getFullYear(), today.getMonth(), 1);
    var lastMonth = new Date(end.getFullYear(), end.getMonth(), 1);
    while (cur <= lastMonth){
      app.appendChild(buildMonth(cur.getFullYear(), cur.getMonth(), today, end));
      cur.setMonth(cur.getMonth()+1);
    }
    updateCount();
    document.getElementById('bar').style.display='block';
  }

  function buildMonth(year, month, today, end){
    var card = document.createElement('div'); card.className='card';
    var title = document.createElement('div'); title.className='monthTitle';
    title.textContent = year + '年' + (month+1) + '月';
    card.appendChild(title);

    var dow = document.createElement('div'); dow.className='dow';
    ['日','月','火','水','木','金','土'].forEach(function(w,i){
      var s=document.createElement('span'); s.textContent=w;
      if(i===0)s.className='sun'; if(i===6)s.className='sat';
      dow.appendChild(s);
    });
    card.appendChild(dow);

    var grid = document.createElement('div'); grid.className='grid';
    var first = new Date(year, month, 1);
    var startDow = first.getDay();           // 0=日
    var daysInMonth = new Date(year, month+1, 0).getDate();

    for (var i=0;i<startDow;i++){
      var e=document.createElement('div'); e.className='cell empty'; grid.appendChild(e);
    }
    for (var d=1; d<=daysInMonth; d++){
      var dt = new Date(year, month, d); dt.setHours(0,0,0,0);
      var cell = document.createElement('div');
      cell.className = 'cell';
      var dow2 = dt.getDay();
      if (dow2===0) cell.classList.add('sun');
      if (dow2===6) cell.classList.add('sat');
      cell.textContent = d;

      if (dt < today || dt > end){
        cell.classList.add('past');       // 範囲外/過去は選択不可
      } else {
        var key = ymd(dt);
        (function(key, cell){
          if (selected[key]) cell.classList.add('on');
          cell.addEventListener('click', function(){
            if (selected[key]){ delete selected[key]; cell.classList.remove('on'); }
            else { selected[key]=true; cell.classList.add('on'); }
            updateCount();
          });
        })(key, cell);
      }
      grid.appendChild(cell);
    }
    card.appendChild(grid);
    return card;
  }

  function updateCount(){
    var n = Object.keys(selected).length;
    document.getElementById('cnt').textContent = n;
  }

  function setMsg(text, cls){
    var m = document.getElementById('msg');
    m.textContent = text || '';
    m.className = 'msg' + (cls? ' '+cls : '');
  }

  // ---- 送信(shift_set) ----
  function submitShift(){
    if (!ME || !ME.userId){ setMsg('ユーザー情報が取得できていません。', 'err'); return; }
    var btn = document.getElementById('send');
    btn.disabled = true; setMsg('送信中…','');
    var days = Object.keys(selected).sort().join(',');
    var url = GAS_URL + '?mode=shift_set&userId=' + encodeURIComponent(ME.userId)
            + '&days=' + encodeURIComponent(days);
    jsonp(url).then(function(res){
      btn.disabled = false;
      if (res && res.ok){
        setMsg('送信しました（稼働可能：' + (res.saved!=null?res.saved:Object.keys(selected).length) + '日）', 'ok');
      } else {
        setMsg((res && res.message) ? res.message : '送信に失敗しました。', 'err');
      }
    }).catch(function(){
      btn.disabled = false;
      setMsg('通信エラーが発生しました。もう一度お試しください。', 'err');
    });
  }

  // ---- 起動(report.html と同じ初期化フロー) ----
  (async function init(){
    try{
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()){ liff.login(); return; }
      var prof = await liff.getProfile();
      ME = { userId: prof.userId, name: prof.displayName };

      // 前回提出を取得してONを復元
      try{
        var res = await jsonp(GAS_URL + '?mode=shift_get&userId=' + encodeURIComponent(ME.userId));
        if (res && res.ok && Array.isArray(res.days)){
          res.days.forEach(function(d){ selected[d] = true; });
        } else if (res && res.ok === false){
          // スタッフ未登録など。カレンダーは出すが注意表示。
          document.getElementById('loading').innerHTML =
            (res.message || 'スタッフ情報が確認できませんでした。マネージャーへご連絡ください。');
          return;
        }
      }catch(e){ /* 取得失敗でも空で続行 */ }

      renderCalendar();
    }catch(e){
      document.getElementById('loading').innerHTML =
        'LINEアプリ内で開いてください。<br>（このページはLINEのリッチメニューから開きます）';
    }
  })();
</script>
</body>
</html>
